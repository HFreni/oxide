<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160" role="img" aria-label="eap-oxide">
  <defs>
    <linearGradient id="rust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C24A1E"/>
      <stop offset="1" stop-color="#8A3110"/>
    </linearGradient>
  </defs>
  <rect x="6" y="6" width="148" height="148" rx="30" fill="url(#rust)"/>
  <rect x="6" y="6" width="148" height="148" rx="30" fill="none" stroke="#FFC83D" stroke-width="4" opacity="0.9"/>
  <!-- automation / gear motif (EAP = PLC automation data) -->
  <g stroke="#FFC83D" stroke-width="4" fill="none">
    <circle cx="80" cy="58" r="15"/>
    <g stroke-linecap="round">
      <line x1="80" y1="35" x2="80" y2="43"/>
      <line x1="80" y1="73" x2="80" y2="81"/>
      <line x1="57" y1="58" x2="65" y2="58"/>
      <line x1="95" y1="58" x2="103" y2="58"/>
      <line x1="63" y1="41" x2="69" y2="47"/>
      <line x1="91" y1="69" x2="97" y2="75"/>
      <line x1="97" y1="41" x2="91" y2="47"/>
      <line x1="69" y1="69" x2="63" y2="75"/>
    </g>
  </g>
  <circle cx="80" cy="58" r="5" fill="#FFE9DD"/>
  <text x="80" y="120" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="34" font-weight="700" fill="#FFE9DD" text-anchor="middle">EAP</text>
  <text x="80" y="140" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="13" fill="#FFC9AE" text-anchor="middle" letter-spacing="3">·OXIDE</text>
</svg>
